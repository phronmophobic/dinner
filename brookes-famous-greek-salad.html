<html lang="en"><head><meta charset="utf-8" /><meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport" /><title>Brooke's Famous Greek Salad</title><link href="bootstrap.min.css" rel="stylesheet" /><link href="recipe.css" rel="stylesheet" /></head><body><div class="recipe-masthead"><nav class="nav recipe-nav"><a class="nav-link" href="index.html">Kitchen</a></nav></div><div class="container"><div class="row"><div class="col-sm-8 recipe-main"><div class="recipe-post"><div><h1 id="Brookes-Famous-Greek-Salad">Brooke&apos;s Famous Greek Salad</h1><h2 id="Ingredients">Ingredients</h2><ul><div class="form-check"><input class="form-check-input" id="G__1382" type="checkbox" /><label class="form-check-label" for="G__1382"><p>Avocado</p></label></div><div class="form-check"><input class="form-check-input" id="G__1383" type="checkbox" /><label class="form-check-label" for="G__1383"><p>Cucumber</p></label></div><div class="form-check"><input class="form-check-input" id="G__1384" type="checkbox" /><label class="form-check-label" for="G__1384"><p>Bell Pepper</p></label></div><div class="form-check"><input class="form-check-input" id="G__1385" type="checkbox" /><label class="form-check-label" for="G__1385"><p>Feta Cheese</p></label></div><div class="form-check"><input class="form-check-input" id="G__1386" type="checkbox" /><label class="form-check-label" for="G__1386"><p>Balsmic Vinegar</p></label></div><div class="form-check"><input class="form-check-input" id="G__1387" type="checkbox" /><label class="form-check-label" for="G__1387"><p>Pinch of Salt</p></label></div></ul><ol><li><p>Mix until tasty</p></li></ol></div></div></div></div></div><script type="text/javascript">
function searchRecipes() {
    const input = document.getElementById('search-bar').value.toLowerCase();
    const recipePost = document.querySelector('.recipe-post');
    const links = recipePost.getElementsByTagName('a');

    // Create a map to track visibility of links under each header
    let sectionMap = new Map();

    for (let i = 0; i < links.length; i++) {
        const link = links[i];
        const textValue = link.textContent || link.innerText;
        let parent = link.parentElement;

        // Traverse up the tree to find the header
        let header = null;
        while (parent) {
            if (/^H[1-6]$/i.test(parent.tagName)) {
                header = parent;
                break;
            }
            parent = parent.previousElementSibling || parent.parentElement;
        }

        if (header && !sectionMap.has(header)) {
            sectionMap.set(header, []);
        }

        if (textValue.toLowerCase().indexOf(input) > -1) {
            link.parentElement.style.display = '';
            if (header) sectionMap.get(header).push(true);
        } else {
            link.parentElement.style.display = 'none';
            if (header) sectionMap.get(header).push(false);
        }
    }

    // Hide sections with no visible links
    sectionMap.forEach((visibilityArray, header) => {
        if (visibilityArray.includes(true)) {
            header.style.display = '';
        } else {
            header.style.display = 'none';
        }
    });
}

   </script></body></html>
